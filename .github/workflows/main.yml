name: WealthTrackers Toolchain

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  windows-build-test:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install SQLite3 (Windows)
      run: choco install sqlite
      shell: cmd

    - name: Initialize SQLite Database
      run: |
        sqlite3 WealthTrackersDB.sqlite < SQLScripts\schema.sql
        sqlite3 WealthTrackersDB.sqlite ".tables"
      shell: cmd

    - name: Run Tests with Pytest
      # Setting the platform to offscreen so PyQT doesn't crash without a monitor
      env:
        QT_QPA_PLATFORM: offscreen
        PYTHONPATH: .
      run: |
        pytest